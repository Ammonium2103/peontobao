name: jarvis_mobile
description: Standalone Futuristic Voice Jarvis AI.
publish_to: 'none'
version: 10.7.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Nới lỏng SDK để tương thích rộng hơn

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  speech_to_text: 7.3.0 # Khóa bản ổn định
  flutter_tts: 4.2.5 # Khóa bản ổn định
  animate_do: ^5.1.0
  avatar_glow: ^3.0.1
  permission_handler: ^11.3.1
  sqflite: ^2.3.0
  path: ^1.9.0
  record: ^5.1.0 # Quay lại bản 5.x đã test ổn định
  audioplayers: ^5.2.1 # Quay lại bản 5.x đã test ổn định
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true
