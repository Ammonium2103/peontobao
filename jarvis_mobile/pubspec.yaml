name: jarvis_mobile
description: Standalone Voice-Enabled Jarvis AI.
publish_to: 'none'
version: 6.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  speech_to_text: 7.3.0
  flutter_tts: 4.2.5
  animate_do: ^3.3.4
  avatar_glow: ^3.0.1
  permission_handler: ^11.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
  record: ^5.1.0
  audioplayers: ^5.2.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
