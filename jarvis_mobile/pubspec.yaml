name: jarvis_mobile
description: Standalone Futuristic Voice Jarvis AI.
publish_to: 'none'
version: 10.6.0+1

environment:
  sdk: '>=3.22.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  animate_do: ^5.1.0
  avatar_glow: ^3.0.1
  permission_handler: ^11.3.1 # Giữ bản 11 để ổn định với SDK 34
  sqflite: ^2.3.3+2
  path: ^1.9.0
  record: ^6.2.0
  audioplayers: ^6.1.0 # Bản fix cho Flutter 3.22.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3 # Giữ bản cũ để tránh lỗi lints nghiêm trọng

flutter:
  uses-material-design: true
