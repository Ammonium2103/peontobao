name: Jarvis Build Cloud v10.7
on:
  push:
    branches: [ "master", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          cd jarvis_mobile
          flutter clean
          flutter pub get --verbose # Bật verbose để soi bug nếu lỗi

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK
        run: |
          cd jarvis_mobile
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-supreme-v10.7
          path: jarvis_mobile/build/app/outputs/flutter-apk/app-release.apk
