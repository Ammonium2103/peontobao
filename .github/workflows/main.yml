name: Jarvis Build Cloud
on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd jarvis_mobile
          flutter pub get

      - name: Build APK
        run: |
          cd jarvis_mobile
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: jarvis-app-release
          path: jarvis_mobile/build/app/outputs/flutter-apk/app-release.apk
