name: Jarvis Build Cloud
on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Repair and Install Dependencies
        run: |
          cd jarvis_mobile
          # Tu dong sua loi project neu thieu file he thong
          flutter create .
          flutter pub get

      - name: Build APK
        run: |
          cd jarvis_mobile
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-app-release
          path: jarvis_mobile/build/app/outputs/flutter-apk/app-release.apk
